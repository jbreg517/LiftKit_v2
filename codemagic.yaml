workflows:
  ios-unsigned-ipa:
    name: LiftKit – iOS Unsigned IPA (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -scheme LiftKit \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/LiftKit.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          # Package .app from archive into an unsigned IPA manually
          # (xcodebuild -exportArchive requires signing; this bypasses it)
          mkdir -p build/export/Payload
          cp -r "build/LiftKit.xcarchive/Products/Applications/LiftKit.app" \
                build/export/Payload/LiftKit.app
          cd build/export && zip -r LiftKit.ipa Payload && cd ../..
    artifacts:
      - build/export/LiftKit.ipa
